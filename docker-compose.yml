version: '3.9'

networks:
  agendazap-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  evolution_instances:

services:
  postgres:
    image: postgres:16-alpine
    container_name: agendazap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agendazap
      POSTGRES_PASSWORD: agendazap123
      POSTGRES_DB: agendazap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agendazap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendazap -d agendazap"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agendazap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agendazap-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: agendazap-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=agendazap-dev-key
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://agendazap:agendazap123@postgres:5432/agendazap?schema=evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_TTL=604800
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1035194821
      - LOG_LEVEL=ERROR
      - LOG_COLOR=true
      - DEL_INSTANCE=false
    networks:
      - agendazap-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  adminer:
    image: adminer:latest
    container_name: agendazap-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - agendazap-network
    depends_on:
      - postgres
