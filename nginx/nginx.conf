worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Limites e timeouts
    client_max_body_size 20M;
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # --- Backend API (AgendaZap) ---
    # Substitua SEU_DOMINIO pelo domínio ou IP do servidor
    server {
        listen 80;
        server_name SEU_DOMINIO;

        # Redireciona para HTTPS quando tiver certificado
        # Descomente após configurar SSL:
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass         http://app:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # --- Evolution API (WhatsApp) ---
    server {
        listen 80;
        server_name evolution.SEU_DOMINIO;

        # return 301 https://$host$request_uri;

        location / {
            proxy_pass         http://evolution-api:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket (Evolution API usa ws para sincronização)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    # --- HTTPS (descomente após rodar certbot) ---
    # server {
    #     listen 443 ssl;
    #     server_name SEU_DOMINIO;
    #
    #     ssl_certificate     /etc/nginx/certs/live/SEU_DOMINIO/fullchain.pem;
