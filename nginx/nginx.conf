worker_processes auto;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    client_max_body_size 20M;
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # DNS interno do Docker — re-resolve upstreams a cada 10s
    resolver 127.0.0.11 valid=10s ipv6=off;

    # -------------------------------------------------------------------------
    # Redireciona HTTP → HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name meuagendazap.com.br app.meuagendazap.com.br api.meuagendazap.com.br;
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # Painel AgendaZap + Backend API — app.meuagendazap.com.br
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name meuagendazap.com.br app.meuagendazap.com.br;

        ssl_certificate     /etc/letsencrypt/live/app.meuagendazap.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.meuagendazap.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Painel administrativo — React SPA servida em /painel
        location = /painel {
            return 301 https://$host/painel/;
        }

        location /painel/ {
            alias /usr/share/nginx/html/admin/;
            index index.html;
            try_files $uri $uri/ /painel/index.html;

            location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Chamadas de API do painel (/api/*) — remove prefixo antes de encaminhar ao backend
        location /api/ {
            set $upstream_app http://app:3000;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         $upstream_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Backend — todo o restante (webhook, rotas admin, health)
        location / {
            set $upstream_app http://app:3000;
            proxy_pass         $upstream_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # -------------------------------------------------------------------------
    # Evolution API (WhatsApp) — api.meuagendazap.com.br
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name api.meuagendazap.com.br;

        ssl_certificate     /etc/letsencrypt/live/app.meuagendazap.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.meuagendazap.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            set $upstream_evo http://evolution-api:8080;
            proxy_pass         $upstream_evo;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
