worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Limites e timeouts
    client_max_body_size 20M;
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # -------------------------------------------------------------------------
    # Backend API — api.SEU_DOMINIO
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name api.SEU_DOMINIO;

        # Descomente após configurar SSL:
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass         http://app:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # -------------------------------------------------------------------------
    # Painel Administrativo — admin.SEU_DOMINIO
    # React SPA: todas as rotas caem no index.html (client-side routing)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name admin.SEU_DOMINIO;

        # Descomente após configurar SSL:
        # return 301 https://$host$request_uri;

        root /usr/share/nginx/html/admin;
        index index.html;

        # Arquivos estáticos com cache agressivo
        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Proxy das chamadas de API para o backend (evita CORS em produção)
        location /api/ {
            proxy_pass         http://app:3000/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Fallback para React Router (SPA)
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # -------------------------------------------------------------------------
    # Evolution API (WhatsApp) — evolution.SEU_DOMINIO
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name evolution.SEU_DOMINIO;

        # return 301 https://$host$request_uri;

        location / {
            proxy_pass         http://evolution-api:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket (Evolution API usa ws para sincronização)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

