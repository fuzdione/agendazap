version: '3.9'

networks:
  agendazap-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  evolution_instances:

services:
  postgres:
    image: postgres:16-alpine
    container_name: agendazap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: agendazap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agendazap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d agendazap"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agendazap-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - agendazap-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: agendazap-evolution
    restart: unless-stopped
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      - SERVER_URL=${EVOLUTION_API_URL}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/agendazap?schema=evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:${REDIS_PASSWORD}@redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_TTL=604800
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1035194821
      - LOG_LEVEL=ERROR
      - LOG_COLOR=false
      - DEL_INSTANCE=false
    networks:
      - agendazap-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app:
    build: .
    container_name: agendazap-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/agendazap
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - ADMIN_URL=${ADMIN_URL}
      - SERVER_URL=${SERVER_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
    networks:
      - agendazap-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  migrate:
    build: .
    container_name: agendazap-migrate
    restart: "no"
    # Usa db push porque o projeto não tem arquivos de migration gerados.
    # Se no futuro você rodar "prisma migrate dev" e commitar a pasta prisma/migrations,
    # troque este comando por: npx prisma migrate deploy
    command: npx prisma db push --accept-data-loss
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/agendazap
    networks:
      - agendazap-network
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build: .
    container_name: agendazap-seed
    restart: "no"
    command: node prisma/seed.js
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/agendazap
      - NODE_ENV=production
      - CLINIC_PHONE=${CLINIC_PHONE}
      - CLINIC_NAME=${CLINIC_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_SENHA=${ADMIN_SENHA}
    networks:
      - agendazap-network
    depends_on:
      migrate:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    container_name: agendazap-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./admin-panel/dist:/usr/share/nginx/html/admin:ro
    networks:
      - agendazap-network
    depends_on:
      - app
      - evolution-api
